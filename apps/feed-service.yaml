apiVersion: apps/v1
kind: Deployment
metadata:
  name: feed-service
  namespace: default
  labels:
    app: feed-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feed-service
  template:
    metadata:
      labels:
        app: feed-service
    spec:
      containers:
      - name: feed-service
        image: 455646290812.dkr.ecr.ap-south-1.amazonaws.com/yt-feed-service:latest
        imagePullPolicy: Always
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://service-registry:8761/eureka/"
        - name: EUREKA_INSTANCE_HOSTNAME
          value: "feed-service"
        - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
          value: "false"
        # Force Eureka to advertise the Kubernetes Service port (80)
        - name: EUREKA_INSTANCE_NON_SECURE_PORT
          value: "80"
        - name: VIDEO_DB_URL
          valueFrom:
            configMapKeyRef:
              name: global-db-config
              key: video_db_url
---
apiVersion: v1
kind: Service
metadata:
  name: feed-service
  namespace: default
  labels:
    app: feed-service
spec:
  ports:
  - port: 80
    targetPort: 8080 
    protocol: TCP
  selector:
    app: feed-service
  type: ClusterIP
