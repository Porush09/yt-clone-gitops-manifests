apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: default
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: 455646290812.dkr.ecr.ap-south-1.amazonaws.com/yt-auth-service:latest
        imagePullPolicy: Always
        env:
        - name: EUREKA_URL
          value: "http://service-registry:8761/eureka/"
        - name: AUTH_DB_URL
          valueFrom:
            configMapKeyRef:
              name: global-db-config
              key: auth_db_url
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: rds-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rds-credentials
              key: password
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: default
  labels:
    app: auth-service
spec:
  ports:
  - port: 80
    targetPort: 8080 
    protocol: TCP
  selector:
    app: auth-service
  type: ClusterIP
