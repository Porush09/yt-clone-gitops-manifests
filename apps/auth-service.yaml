apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: default
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        oneagent.dynatrace.com/inject: "true"
    spec:
      containers:
      - name: auth-service
        image: 455646290812.dkr.ecr.ap-south-1.amazonaws.com/yt-auth-service:v7
        imagePullPolicy: Always
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://service-registry:8761/eureka/"
        - name: EUREKA_INSTANCE_HOSTNAME
          value: "auth-service" # Matches the k8s Service name exactly
        - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
          value: "false" # Force it to use the stable hostname string
        - name: EUREKA_INSTANCE_NON_SECURE_PORT
          value: "80"
        - name: AUTH_DB_URL
          valueFrom:
            configMapKeyRef:
              name: global-db-config
              key: auth_db_url
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: rds-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rds-credentials
              key: password
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: default
  labels:
    app: auth-service
spec:
  ports:
  - port: 80
    targetPort: 8081 
    protocol: TCP
  selector:
    app: auth-service
  type: ClusterIP
