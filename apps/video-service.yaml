apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-service
  namespace: default
  labels:
    app: video-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: video-service
  template:
    metadata:
      labels:
        app: video-service
    spec:
      containers:
      - name: video-service
        image: 455646290812.dkr.ecr.ap-south-1.amazonaws.com/yt-video-service:latest
        imagePullPolicy: Always
        env:
        # 1. The Correct Service Registry endpoint location
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://service-registry:8761/eureka/"
        
        # 2. FORCE Spring to read the relaxed property matching layout
        - name: SPRING_CLOUD_CLIENT_IP_ADDRESS
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        
        # 3. Force Eureka to map the address metadata straight to the raw IP value
        - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
          value: "true"
        - name: EUREKA_INSTANCE_HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: VIDEO_DB_URL
          valueFrom:
            configMapKeyRef:
              name: global-db-config
              key: video_db_url
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: rds-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rds-credentials
              key: password
        - name: AWS_REGION
          value: "ap-south-1"
        - name: AWS_S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: global-db-config
              key: s3_bucket_name
        - name: AWS_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access_key
        - name: AWS_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret_key
---
apiVersion: v1
kind: Service
metadata:
  name: video-service
  namespace: default
  labels:
    app: video-service
spec:
  ports:
  - port: 80
    targetPort: 8080 
    protocol: TCP
  selector:
    app: video-service
  type: ClusterIP
